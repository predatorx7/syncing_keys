include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # The privacy manifest catches App Store submission failures we want to
    # surface as errors during local development, not warnings.
    invalid_use_of_visible_for_testing_member: error

linter:
  rules:
    # Style / correctness
    - always_declare_return_types
    - avoid_dynamic_calls
    - cancel_subscriptions
    - close_sinks
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - prefer_interpolation_to_compose_strings
    - sort_child_properties_last
    - unawaited_futures
    - unnecessary_lambdas
    - unnecessary_parenthesis
    - use_key_in_widget_constructors

    # Public-API hygiene — turned off by default in flutter_lints. Keeping
    # this at hint level (linter rule, not analyzer error) so it shows up
    # locally without blocking CI.
    # - public_member_api_docs   # noisy on the first pass; revisit when API stabilises.
