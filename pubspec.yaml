name: syncing_keys
description: "SyncingKeys SDK — set-and-forget secure key management & cross-device sync for Starknet/Ethereum Flutter apps."
version: 0.3.0
homepage: https://github.com/everydayapp-xyz/syncing_keys

environment:
  sdk: ^3.11.5
  flutter: '>=3.13.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

  # Cryptography — pointycastle covers PBKDF2-HMAC-SHA256, AES-GCM, secp256k1,
  # SHA-256/HMAC, and big-int curve math (we use this for STARK curve math too).
  pointycastle: ^3.9.1

  # Hex/base64 helpers + extra crypto primitives.
  convert: ^3.1.1
  crypto: ^3.0.5

  # Mnemonic + BIP-32 HD derivation (used by the Ethereum generator).
  bip39: ^1.0.6
  bip32: ^2.0.0

  # Biometric "unlock PIN" pre-gate on devices that support it.
  local_auth: ^2.3.0

  # Keychain/Keystore-backed at-rest storage for the biometric-gated PIN.
  # The PIN is only persisted here when biometric unlock is enabled; reads
  # are gated behind a successful local_auth gesture (see BiometricPinStore).
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Faked at the platform-interface layer in test/pin_entry_biometric_test.dart
  # so the biometric flow is exercised without method channels.
  local_auth_platform_interface: ^1.0.0

flutter:
  plugin:
    platforms:
      android:
        package: app.xyz.everydayapp.syncing_keys
        pluginClass: SyncingKeysPlugin
      ios:
        pluginClass: SyncingKeysPlugin
